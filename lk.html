document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle=\"{{ stage.badgeStyle }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:currentColor;\"><\u002Fspan>{{ stage.statusLabel }}<\u002Fspan>\n                        <\u002Fdiv>\n                        <div style=\"display:flex;align-items:center;gap:16px;margin-top:14px;\">\n                          <button onclick=\"{{ stage.onToggle }}\" style=\"{{ detailBtn }}\" style-hover=\"filter:brightness(1.15)\">{{ stage.btnLabel }}<\u002Fbutton>\n                          <span style=\"font-size:13px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;margin-left:auto;\">{{ stage.time }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <sc-if value=\"{{ stage.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"margin-top:18px;padding-top:18px;border-top:1px solid var(--bd-07);\">\n                        <sc-if value=\"{{ stage.welcome }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div>\n                            <div style=\"font-size:18px;font-weight:700;margin-bottom:10px;\">Здравствуйте, Иван Иванов<\u002Fdiv>\n                            <p style=\"margin:0 0 10px;font-size:15px;line-height:1.6;color:var(--text-3);\">Благодарим Вас за обращение в нашу компанию. Вы можете задать интересующие вопросы по телефону или в чате личного кабинета.<\u002Fp>\n                            <p style=\"margin:0 0 16px;font-size:15px;line-height:1.6;color:var(--text-primary);font-weight:600;\">Ниже сформирован график и договор на предоставление услуг.<\u002Fp>\n                            <div style=\"display:flex;gap:13px;padding:16px 18px;border-radius:12px;background:rgba(63,185,80,0.10);border:1px solid rgba(63,185,80,0.22);margin-bottom:18px;\">\n                              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3FB950\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"m8.5 12 2.5 2.5 4.5-5\"><\u002Fpath><\u002Fsvg>\n                              <span style=\"font-size: 14px; line-height: 1.55; color: #3FB950\">Согласованный график работы — это приложение к договору, в котором пошагово описаны все действия на период совместной работы по решению проблем с кредитами.<\u002Fspan>\n                            <\u002Fdiv>\n                            <button style=\"display:inline-flex;align-items:center;gap:9px;padding:11px 18px;border:1px solid var(--bd-12);border-radius:10px;background:var(--bg-soft);color:var(--text-primary);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;\" style-hover=\"background:var(--bg-hover)\">\n                              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12M7 11l5 5 5-5\"><\u002Fpath><path d=\"M4 21h16\"><\u002Fpath><\u002Fsvg>\n                              Скачать документы\n                            <\u002Fbutton>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n                        <sc-if value=\"{{ stage.notWelcome }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div>\n                            <p style=\"margin:0 0 16px;font-size:15px;line-height:1.6;color:var(--text-3);\">{{ stage.detail }}<\u002Fp>\n                            <button style=\"display:inline-flex;align-items:center;gap:9px;padding:10px 16px;border:1px solid var(--bd-12);border-radius:10px;background:var(--bg-soft);color:var(--text-primary);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;\" style-hover=\"background:var(--bg-hover)\">\n                              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12M7 11l5 5 5-5\"><\u002Fpath><path d=\"M4 21h16\"><\u002Fpath><\u002Fsvg>\n                              Документы этапа\n                            <\u002Fbutton>\n                          <\u002Fdiv>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- FORM left content -->\n              <sc-if value=\"{{ isForm }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;gap:20px;\">\n\n                <!-- 01 Личные данные -->\n                <div style=\"background:var(--bg-card);border:1px solid var(--bd-06);border-radius:18px;padding:26px 28px;\">\n                  <h2 style=\"margin:0 0 16px;font-size:22px;font-weight:800;letter-spacing:-0.01em;\"><span style=\"color:var(--text-faintest);\">01.<\u002Fspan> Личные данные<\u002Fh2>\n                  <div style=\"display:flex;gap:12px;align-items:center;padding:14px 16px;border-radius:12px;background:rgba(63,185,80,0.10);border:1px solid rgba(63,185,80,0.20);margin-bottom:22px;\">\n                    <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3FB950\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M9.5 9a2.5 2.5 0 0 1 4.5 1.5c0 1.5-2 2-2 3\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-size: 14px; color: #3FB950; line-height: 1.5\">Заполните основные данные о себе — ФИО, контактный телефон и адрес<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:18px;\">\n                    <div style=\"display:grid;grid-tem ock;font-size:13px;color:var(--text-muted);font-weight:500;margin-bottom:8px;\">Адрес регистрации<\u002Flabel><input style=\"width:100%;height:46px;padding:0 14px;background:var(--bg-input);border:1px solid var(--bd-10);border-radius:10px;color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;\" style-focus=\"border-color:#E5484D\"><\u002Fdiv>\n                      <div><label style=\"display:block;font-size:13px;color:var(--text-muted);font-weight:500;margin-bottom:8px;\">Фактический адрес<\u002Flabel><input style=\"width:100%;height:46px;padding:0 14px;background:var(--bg-input);border:1px solid var(--bd-10);border-radius:10px;color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;\" style-focus=\"border-color:#E5484D\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div><label style=\"display:block;font-size:13px;color:var(--text-muted);font-weight:500;margin-bottom:8px;\">Предыдущее ФИО (если менялось)<\u002Flabel><input style=\"width:100%;height:46px;padding:0 14px;background:var(--bg-input);border:1px solid var(--bd-10);border-radius:10px;color:var(--text-primary);font-family:inherit;font-size:14px;outline:none;\" style-focus=\"border-color:#E5484D\"><\u002Fdiv>\n                    <div>\n                      <label style=\"display:block;font-size:13px;color:var(--text-muted);font-weight:500;margin-bottom:10px;\">Пол<\u002Flabel>\n                      <div style=\"display:flex;gap:28px;\">\n                        <sc-for list=\"{{ genderOpts }}\" as=\"opt\" hint-placeholder-count=\"2\">\n                          <div onclick=\"{{ opt.onSelect }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer;transition:opacity .12s;\" style-hover=\"opacity:0.7\">\n                            <span style=\"width:20px;height:20px;border-radius:50%;border:2px solid #E5484D;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                              <sc-if value=\"{{ opt.selected }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:10px;height:10px;border-radius:50%;background:#E5484D;\"><\u002Fspan><\u002Fsc-if>\n                            <\u002Fspan>\n                            <span style=\"font-size:15px;color:var(--text-strong);\">{{ opt.label }}<\u002Fspan>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- 02 Паспортные данные -->\n                <div style=\"background:var(--bg-card);border:1px solid var(--bd-06);border-radius:18px;padding:26px 28px;\">\n                  <h2 style=\"margin:0 0 16px;font-size:22px;font-weight:800;letter-spacing:-0.01em;\"><span style=\"color:var(--text-faintest);\">02.<\u002Fspan> Паспортные данные<\u002Fh2>\n                  <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:12px;background:rgba(63,185,80,0.10);border:1px solid rgba(63,185,80,0.20);margin-bottom:22px;\">\n                    <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3FB950\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M9.5 9a2.5 2.5 0 0 1 4.5 1.5c0 1.5-2 2-2 3\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-size: 14px; color: #3FB950; line-height: 1.55\">Введите данные вашего паспорта. Мы дорожим репутацией нашего клиента — вы можете ознакомиться с <span style=\"color:#E5484D;font-weight:600;cursor:pointer;\">обработкой персональных данных<\u002Fspan> и <span style=\"color:#E5484D;font-weight:600;cursor:pointer;\">политикой конфиденциальности<\u002Fspan>.<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:18px;\">\n der-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.6);\">\n            <div style=\"display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--bd-07);flex-shrink:0;\">\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ viewDocType }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:var(--text-muted2);font-family:'JetBrains Mono',monospace;margin-top:2px;\">от {{ viewDate }} · дело № БК-2025-0418<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ closeContract }}\" style=\"margin-left:auto;width:38px;height:38px;border-radius:10px;background:var(--bg-soft);border:1px solid var(--bd-08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);flex-shrink:0;\" style-hover=\"background:var(--bg-hover);color:var(--text-primary)\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6 6 18\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;overflow-y:auto;padding:28px;background:var(--bg-deep);\">\n              <div data-m=\"contractdoc\" style=\"max-width:620px;margin:0 auto;background:#fff;color:#1a1a1a;font-family:Georgia,'Times New Roman',serif;padding:48px 54px;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,0.4);line-height:1.6;font-size:13px;\">\n                <div style=\"display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:18px;\">\n                  <svg width=\"26\" height=\"26\" viewBox=\"0 0 40 40\" fill=\"none\"><path d=\"M6 13 L17 25 L34 6\" stroke=\"#B0151B\" stroke-width=\"5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M6 22 L17 34 L34 15\" stroke=\"#B0151B\" stroke-width=\"5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  <span style=\"font-size:15px;font-weight:800;letter-spacing:0.04em;color:#1a1a1a;font-family:'Golos Text',sans-serif;\">ПРАВО НА ЗАЩИТУ<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"text-align:center;font-size:13px;line-height:1.4;\">Общество с ограниченной ответственностью<br>ООО «Право на Защиту»<\u002Fdiv>\n                <div style=\"border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;margin:12px 0;padding:5px 0;text-align:center;font-size:11px;\">ИНН 2600000000 · ОГРН 1000000000000 · КПП 260000000<\u002Fdiv>\n                <div style=\"text-align:center;font-weight:700;font-size:15px;margin:22px 0 18px;\">{{ viewDocType }}<\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:22px;\">\n                  <span>Российская Федерация, Ставропольский край, г. Михайловск<\u002Fspan>\n                  <span>{{ viewDate }}<\u002Fspan>\n                <\u002Fdiv>\n\n                <div style=\"font-weight:700;margin-bottom:8px;\">1. Общие положения<\u002Fdiv>\n                <p style=\"margin:0 0 12px;text-align:justify;\">1.1. Настоящий документ является официальным предложением (офертой) Общества с ограниченной ответственностью «Право на Защиту» в лице Генерального директора, действующего на основании устава, именуемого в дальнейшем «Исполнитель», и содержит существенные условия предоставления юридических и консультационных услуг.<\u002Fp>\n                <p style=\"margin:0 0 12px;text-align:justify;\">1.2. В соответствии с пунктом 2 статьи 437 Гражданского кодекса Российской Федерации в случае принятия изложенных ниже условий и оплаты услуг физическое лицо, производящее акцепт настоящей Оферты, становится Заказчиком, а Исполнитель и Заказчик совместно — Сторонами договора.<\u002Fp>\n                <p style=\"margin:0 0 18px;text-align:justify;\">1.3. Акцептом настоящей Оферты является оплата услуг Исполнителя в порядке, предусмотренном разделом 4 настоящего договора.<\u002Fp>\n\n                <div style=\"font-weight:700;margin-bottom:8px;\">2. Предмет договора<\u002Fdiv>\n                <p style=\"margin:0 0 12px;text-align:justify;\">2.1. Исполнитель обязуется оказать Заказчику комплекс юридических услуг по сопровождению процедуры банкротства физического лица и защите от неправомерных действий кредиторов и коллекторов, а Заказчик обязуется оплатить эти услуги.<\u002Fp>\n                <p style=\"margin:0 0 18px;text-align:justify;\">2.2. Перечень и сроки оказания услуг определяются согласованным Сторонами планом-графиком, являющимся приложением к настоящему договору.<\u002Fp>\n\n                <div style=\"font-weight:700;margin-bottom:8px;\">3. Права и обязанности Сторон<\u002Fdiv>\n                <p style=\"margin:0 0 12px;text-align:justify;\">3.1. Исполнитель обязуется приступить к оказанию услуг в течение трёх рабочих дней с момента акцепта Оферты и информировать Заказчика о ходе исполнения через личный кабинет.<\u002Fp>\n                <p style=\"margin:0 0 18px;text-align:justify;\">3.2. Заказчик обязуется предоставить Исполнителю достоверные сведения и документы, необходимые для оказания услуг, в сроки, установленные планом-графиком.<\u002Fp>\n\n                <div style=\"font-weight:700;margin-bottom:8px;\">4. Стоимость услуг и порядок расчётов<\u002Fdiv>\n                <p style=\"margin:0 0 12px;text-align:justify;\">4.1. Стоимость услуг и порядок их оплаты определяются графиком платежей. Оплата производится ежемесячно в размере, указанном в графике.<\u002Fp>\n                <p style=\"margin:0 0 26px;text-align:justify;\">4.2. Обязательства Заказчика по оплате считаются исполненными с момента поступления денежных средств на расчётный счёт Исполнителя.<\u002Fp>\n\n                <div style=\"display:flex;justify-content:space-between;gap:24px;font-size:12px;margin-top:34px;\">\n                  <div>\n                    <div style=\"font-weight:700;margin-bottom:6px;\">Исполнитель<\u002Fdiv>\n                    <div>ООО «Право на Защиту»<\u002Fdiv>\n                    <div style=\"margin-top:18px;color:#666;\">_______________ / Корельский Д. Ю. /<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"font-weight:700;margin-bottom:6px;\">Заказчик<\u002Fdiv>\n                    <div>Иванов Иван Иванович<\u002Fdiv>\n                    <div style=\"margin-top:18px;color:#666;\">_______________ / Иванов И. И. /<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:12px;padding:16px 22px;border-top:1px solid var(--bd-07);flex-shrink:0;\">\n              <button style=\"display:inline-flex;align-items:center;gap:9px;height:46px;padding:0 20px;border:none;border-radius:10px;background:#E5484D;color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:filter .15s;\" style-hover=\"filter:brightness(1.08)\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12M7 11l5 5 5-5\"><\u002Fpath><path d=\"M4 21h16\"><\u002Fpath><\u002Fsvg>\n                Скачать документ\n              <\u002Fbutton>\n              <button onclick=\"{{ closeContract }}\" style=\"margin-left:auto;height:46px;padding:0 22px;border:1px solid var(--bd-12);border-radius:10px;background:var(--bg-soft);color:var(--text-strong);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;\" style-hover=\"background:var(--bg-hover)\">Закрыть<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E5484D&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#E5484D&quot;,&quot;#2A6FDB&quot;,&quot;#1F8A5B&quot;,&quot;#7C5CFF&quot;],&quot;section&quot;:&quot;Оформление&quot;},&quot;showRightRail&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Оформление&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    activeNav: 'home', activeFilter: 'all', expandedId: 1, collapsed: false,\n    drawerOpen: false, winW: (typeof window !== 'undefined' ? window.innerWidth : 1280),\n    theme: ((typeof localStorage !== 'undefined' && localStorage.getItem('lk-theme')) || 'dark'),\n    searchOpen: false, query: '',\n    notifOpen: false, notifFilter: 'all',\n    noPatronymic: false, gender: '', marital: '', income: '', creditors: [1], creditorSeq: 1, saved: false, customAmount: '',\n    expandedCats: { personal: true },\n    docSeq: 100,\n    viewContract: null,\n    activeThread: 'lawyer', chatInput: '',\n    threadUnread: { lawyer: 2, manager: 0, support: 0 },\n    chatThreads: {\n      lawyer: [\n        { id: 1, from: 'system', text: 'Чат создан · дело № БК-2025-0418', time: '09:40' },\n        { id: 2, from: 'them', text: 'Добрый день, Иван! Меня зовут Анна, я буду вести вашу процедуру банкротства.', time: '09:41' },\n        { id: 3, from: 'them', text: 'Договор и график платежей уже доступны в разделе «Документы».', time: '09:41' },\n        { id: 4, from: 'me', text: 'Здравствуйте, Анна! Спасибо, всё посмотрел. Когда подаём заявление в суд?', time: '10:02' },\n        { id: 5, from: 'them', text: 'Заявление подадим на этой неделе, после поступления первого платежа. Сообщу, как только его примут к производству.', time: '10:05' },\n        { id: 6, from: 'them', file: 'zayavlenie_o_bankrotstve.pdf', time: '10:06' },\n        { id: 7, from: 'me', text: 'Отлично, понял. Платёж внесу сегодня.', time: '10:09' },\n      ],\n      manager: [\n        { id: 1, from: 'system', text: 'Финансовый управляющий назначается после принятия заявления судом', time: '—' },\n        { id: 2, from: 'them', text: 'Здравствуйте. Я буду вашим финансовым управляющим на этапе реализации. Свяжусь с вами после первого заседания.', time: 'Вчера' },\n      ],\n      support: [\n        { id: 1, from: 'them', text: 'Здравствуйте! Это техническая поддержка «Право на Защиту». Поможем с доступом к личному кабинету и документам.', time: 'Пн' },\n      ],\n    },\n    docFiles: {\n      passport: [{ id: 1, name: 'passport_main.pdf' }, { id: 2, name: 'passport_propiska.pdf' }],\n      snils: [{ id: 3, name: 'snils.pdf' }],\n      inn: [],\n      marriage: [{ id: 4, name: 'svidetelstvo_o_brake.pdf' }],\n      children: [],\n      labor: [{ id: 5, name: 'trudovaya_knizhka.pdf' }],\n      workref: [],\n      ndfl: [{ id: 6, name: 'spravka_2ndfl_2024.pdf' }],\n      bankstmt: [{ id: 7, name: 'vypiska_sberbank.pdf' }, { id: 8, name: 'vypiska_tinkoff.pdf' }],\n      egrn: [],\n      pts: [],\n      deals3y: [],\n    },\n    notifs: [\n      { id: 1, type: 'pay', title: 'Ожидает оплаты', text: 'Платёж «Банкротство» 15 000 ₽ нужно внести до 10.03', time: '2 часа назад', group: 'today', read: false },\n      { id: 2, type: 'stage', title: 'Этап обновлён', text: '«Подача заявления в суд» переведён в статус «В работе»', time: '4 часа назад', group: 'today', read: false },\n      { id: 3, type: 'chat', title: 'Новое сообщение', text: 'Юрист Анна: Добрый день! Мы подготовили заявление к подаче.', time: '5 часов назад', group: 'today', read: false },\n      { id: 4, type: 'doc', title: 'Новый документ', text: 'Добавлен «График платежей (приложение)»', time: 'Вчера, 16:20', group: 'earlier', read: true },\n      { id: 5, type: 'contract', title: 'Договор подписан', text: 'Договор № БК-2025-0418 успешно подписан обеими сторонами', time: '2 дня назад', group: 'earlier', read: true },\n      { id: 6, type: 'stage этап — суд выносит определение о завершении процедуры и списании оставшейся задолженности.' },\n    ];\n  }\n\n  toggle(id) { this.setState(s => ({ expandedId: s.expandedId === id ? null : id })); }\n  toggleCollapse() {\n    if (this.state.winW <= 760) { this.setState(s => ({ drawerOpen: !s.drawerOpen })); }\n    else { this.setState(s => ({ collapsed: !s.collapsed })); }\n  }\n  closeDrawer() { this.setState({ drawerOpen: false }); }\n  toggleTheme() {\n    this.setState(s => {\n      const theme = s.theme === 'light' ? 'dark' : 'light';\n      try { localStorage.setItem('lk-theme', theme); } catch (e) {}\n      return { theme };\n    });\n  }\n  openSearch() { this.setState({ searchOpen: true }); }\n  closeSearch() { this.setState({ searchOpen: false }); }\n  onSearchInput(e) { this.setState({ query: e.target.value, searchOpen: true }); }\n  onSearchKey(e) { if (e.key === 'Escape') this.setState({ searchOpen: false }); }\n  clearSearch() { this.setState({ query: '' }); }\n  selectStage(id) { this.setState({ activeNav: 'home', expandedId: id, searchOpen: false, query: '' }); }\n  goSection(nav) { this.setState({ activeNav: nav, searchOpen: false, query: '' }); }\n  setQuery(t) { this.setState({ query: t, searchOpen: true }); }\n  toggleNotif() { this.setState(s => ({ notifOpen: !s.notifOpen })); }\n  closeNotif() { this.setState({ notifOpen: false }); }\n  setNotifFilter(f) { this.setState({ notifFilter: f }); }\n  markAllRead() { this.setState(s => ({ notifs: s.notifs.map(n => ({ ...n, read: true })) })); }\n  openNotif(id) {\n    const map = { pay: 'payments', doc: 'docs', stage: 'home', chat: 'chat', contract: 'contracts' };\n    this.setState(s => {\n      const notifs = s.notifs.map(n => n.id === id ? { ...n, read: true } : n);\n      const t = s.notifs.find(n => n.id === id);\n      return { notifs, activeNav: t ? map[t.type] : s.activeNav, notifOpen: false };\n    });\n  }\n  toggleNoPatr() { this.setState(s => ({ noPatronymic: !s.noPatronymic })); }\n  set
